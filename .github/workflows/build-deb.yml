name: "📦 Build .deb Paket"

on:
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release erstellen?'
        required: true
        default: 'false'
        type: choice
        options: [ 'false', 'true' ]

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-deb:
    name: "📦 Debian Paket bauen (Ubuntu 22.04)"
    runs-on: ubuntu-22.04

    steps:
      - name: "📥 Quellcode auschecken"
        uses: actions/checkout@v4

      - name: "🦀 Rust stable installieren"
        uses: dtolnay/rust-toolchain@stable

      - name: "⚡ Rust-Cache laden"
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      - name: "📦 System-Abhängigkeiten installieren"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential pkg-config \
            libxcb-render0-dev libxcb-shape0-dev libxcb-xfixes0-dev \
            libxkbcommon-dev libssl-dev \
            libgtk-3-dev \
            dpkg-dev fakeroot lintian

      - name: "🔖 Version lesen"
        id: version
        run: |
          VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Version: ${VERSION}"

      - name: "🏷️ Release-Flag"
        id: flags
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || \
             [[ "${{ github.event.inputs.create_release }}" == "true" ]]; then
            echo "do_release=true"  >> "$GITHUB_OUTPUT"
          else
            echo "do_release=false" >> "$GITHUB_OUTPUT"
          fi

      - name: "🔨 Release-Binary kompilieren"
        run: cargo build --release

      - name: "📦 .deb Paket bauen"
        run: |
          chmod +x packaging/scripts/build-deb.sh
          bash packaging/scripts/build-deb.sh --skip-compile

      - name: "✅ Lintian Qualitätsprüfung"
        run: |
          lintian --color always \
            dist/verbrauchsmanager_${{ steps.version.outputs.version }}_amd64.deb || true

      - name: "💾 .deb als Artefakt speichern"
        uses: actions/upload-artifact@v4
        with:
          name: "verbrauchsmanager_${{ steps.version.outputs.version }}_amd64"
          path: dist/verbrauchsmanager_*.deb
          retention-days: 30

      - name: "🚀 GitHub Release erstellen"
        if: steps.flags.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          name: "Verbrauchsmanager v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          body: |
            ## ⚡ Verbrauchsmanager v${{ steps.version.outputs.version }}

            ### 📥 Installation
            ```bash
            sudo dpkg -i verbrauchsmanager_${{ steps.version.outputs.version }}_amd64.deb
            sudo apt-get install -f
            ```
          files: dist/verbrauchsmanager_*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
