# .github/workflows/build-deb.yml
# ─────────────────────────────────────────────────────────────────────────────
# GitHub Actions: Baut automatisch das .deb-Paket.
#
# Wird ausgelöst durch:
#   1. Push auf main/develop
#   2. Release-Tag (v1.0.0, v1.2.3 …)
#   3. Manuell über GitHub-Oberfläche (Actions → Run workflow)
# ─────────────────────────────────────────────────────────────────────────────

name: "📦 Build .deb Paket"

on:
  # ── Automatisch bei Push ───────────────────────────────────────────────────
  push:
    branches: [ main, develop ]
    tags: [ 'v*' ]

  # ── Automatisch bei Pull Requests ─────────────────────────────────────────
  pull_request:
    branches: [ main ]

  # ── Manuell über GitHub-Oberfläche ────────────────────────────────────────
  # Klicke im Browser: Actions → "Build .deb Paket" → "Run workflow"
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version überschreiben (leer = aus Cargo.toml lesen)'
        required: false
        default: ''
      create_release:
        description: 'GitHub Release erstellen?'
        required: true
        default: 'false'
        type: choice
        options:
          - 'false'
          - 'true'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  build-deb:
    name: "📦 Debian Paket bauen (Ubuntu 22.04)"
    runs-on: ubuntu-22.04

    steps:
      # ── Quellcode laden ────────────────────────────────────────────────────
      - name: "📥 Quellcode auschecken"
        uses: actions/checkout@v4

      # ── Rust Toolchain ─────────────────────────────────────────────────────
      - name: "🦀 Rust stable installieren"
        uses: dtolnay/rust-toolchain@stable

      - name: "⚡ Rust-Cache laden"
        uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true

      # ── System-Abhängigkeiten ──────────────────────────────────────────────
      - name: "📦 Qt6 und Build-Tools installieren"
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            build-essential cmake ninja-build pkg-config \
            qt6-base-dev qt6-declarative-dev qt6-tools-dev \
            libqt6core6 libqt6gui6 libqt6qml6 libqt6quick6 \
            libqt6quickcontrols2-6 libqt6widgets6 \
            libgl1-mesa-dev libsqlite3-dev \
            dpkg-dev fakeroot lintian \
            qml6-module-qtquick-controls \
            qml6-module-qtquick-layouts \
            qml6-module-qtquick-dialogs

      # ── Version bestimmen ──────────────────────────────────────────────────
      - name: "🔖 Version bestimmen"
        id: version
        run: |
          if [[ -n "${{ github.event.inputs.version_override }}" ]]; then
            VERSION="${{ github.event.inputs.version_override }}"
            echo "Version manuell gesetzt: ${VERSION}"
          else
            VERSION=$(grep '^version' Cargo.toml | head -1 | sed 's/.*"\(.*\)".*/\1/')
            echo "Version aus Cargo.toml: ${VERSION}"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      # ── Release-Flag setzen ────────────────────────────────────────────────
      - name: "🏷️ Release-Flag bestimmen"
        id: flags
        run: |
          if [[ "${{ github.ref }}" == refs/tags/v* ]] || \
             [[ "${{ github.event.inputs.create_release }}" == "true" ]]; then
            echo "do_release=true"  >> "$GITHUB_OUTPUT"
          else
            echo "do_release=false" >> "$GITHUB_OUTPUT"
          fi

      # ── Rust kompilieren ───────────────────────────────────────────────────
      - name: "🔨 Release-Binary kompilieren"
        run: cargo build --release

      # ── .deb Paket bauen ───────────────────────────────────────────────────
      - name: "📦 .deb Paket bauen"
        run: |
          chmod +x packaging/scripts/build-deb.sh
          chmod +x packaging/scripts/check-deps.sh
          bash packaging/scripts/build-deb.sh --skip-compile

      # ── Lintian Qualitätsprüfung ───────────────────────────────────────────
      - name: "✅ Lintian Qualitätsprüfung"
        run: |
          lintian --color always \
            dist/verbrauchsmanager_${{ steps.version.outputs.version }}_amd64.deb || true

      # ── Paket als Artefakt hochladen (immer) ──────────────────────────────
      - name: "💾 .deb als Artefakt speichern"
        uses: actions/upload-artifact@v4
        with:
          name: "verbrauchsmanager_${{ steps.version.outputs.version }}_amd64"
          path: dist/verbrauchsmanager_*.deb
          retention-days: 30

      # ── GitHub Release erstellen (nur bei v*-Tag oder manueller Wahl) ─────
      - name: "🚀 GitHub Release erstellen"
        if: steps.flags.outputs.do_release == 'true'
        uses: softprops/action-gh-release@v1
        with:
          name: "Verbrauchsmanager v${{ steps.version.outputs.version }}"
          tag_name: "v${{ steps.version.outputs.version }}"
          body: |
            ## ⚡ Verbrauchsmanager v${{ steps.version.outputs.version }}

            Strom (kWh), Wasser (m³) und Gas (m³) erfassen und auswerten.

            ### 📥 Installation auf Ubuntu / Debian

            ```bash
            # 1. Paket herunterladen und installieren
            sudo dpkg -i verbrauchsmanager_${{ steps.version.outputs.version }}_amd64.deb

            # 2. Fehlende Abhängigkeiten automatisch nachholen
            sudo apt-get install -f
            ```

            ### ✅ Voraussetzungen
            - Ubuntu 22.04 / Debian 12 oder neuer
            - Qt 6.2 oder neuer
          files: dist/verbrauchsmanager_*.deb
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
