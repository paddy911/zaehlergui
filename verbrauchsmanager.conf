# /etc/verbrauchsmanager/verbrauchsmanager.conf
# Systemweite Standardkonfiguration für den Verbrauchsmanager.
# Benutzer-spezifische Einstellungen haben Vorrang.

# Standard-Datenbankpfad (leer = benutzerabhängiger Standardpfad)
# Beispiel: DB_PFAD=/srv/verbrauchsmanager/verbrauch.db
DB_PFAD=

# Qt Quick Controls 2 Style (Fusion | Material | Universal | Default)
QT_QUICK_CONTROLS_STYLE=Fusion

# Sprache (leer = Systemsprache)
# Beispiel: SPRACHE=de_DE
SPRACHE=
